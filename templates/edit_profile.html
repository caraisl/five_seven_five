{% extends 'base.html' %} 
{% load static %}

{% block title_block %}
Edit Profile
{% endblock %}

{% block body_block %}
<div class="auth-page">
    <h1> Edit Profile </h1>
    <p>Update your bio or profile picture.</p>

    <form method="post" enctype="multipart/form-data" id="haikuPost">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" id="haikuSubmit">Save Changes</button>
        <a href="{% url 'five_seven_five_app:index' %}" class="greyBtn">Discard Changes</a>
    </form>
</div>
{% endblock %}
