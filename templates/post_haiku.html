{% extends 'base.html' %}
{% load static %}

{% block title_block %}
Post a Haiku
{% endblock %}

{% block body_block %}
<div class="auth-page">
    <h1 class="form-title">Post a Haiku</h1>
    <p class="form-subtitle">Share a new haiku with the community</p>

    <form method="post" enctype="multipart/form-data" id="haikuPost">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" id="haikuSubmit">Post Haiku</button>
    </form>
</div>
{% endblock %}
