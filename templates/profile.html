{% extends 'feed.html' %} 
{% load static %}

{% block feed_desc %}
<h1>{{ profile.username }}</h1>
<img src="{{ MEDIA_URL }}{{profile.profile_picture}}">
    {% if profile.username.username == user.username %}
    <p><a href="{% url 'five_seven_five_app:edit_profile' %}">Edit Profile</a></p>
    {% endif %}
<p>{{ profile.bio }}</p>
{% endblock %}
