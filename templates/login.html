{% extends 'base.html' %}
{% load staticfiles %}
{% block body_block %}
    <h1>Login</h1>
    <form method="post" action="{% url 'five_seven_five_app:login' %}">
        {% csrf_token %}
        Username: <input type="text" name="username" /><br />
        Password: <input type="password" name="password" /><br />
        <input type="submit" value="Login" />
    </form>
{% endblock %}
